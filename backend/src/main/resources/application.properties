# Server
server.port=8080

# MySQL (Aiven Cloud) - values loaded from .env
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# open-in-view disabled to prevent lazy DB queries during view rendering
spring.jpa.open-in-view=false
# Dialect auto-detected by Hibernate (no need to specify explicitly)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}


# ===== Spring Mail (Brevo SMTP) =====
spring.mail.host=${BREVO_SMTP_HOST}
spring.mail.port=${BREVO_SMTP_PORT}
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Mail sender details
app.mail.from=${BREVO_FROM_EMAIL}
app.mail.from-name=${BREVO_FROM_NAME}

# MVC - enable handler mapping cache to suppress cache-miss WARN logs
spring.mvc.pathmatch.use-suffix-pattern=false
